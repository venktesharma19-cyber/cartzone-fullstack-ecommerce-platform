services:
  postgres:
    image: postgres:16-alpine
    container_name: cartzone-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cartzone
      POSTGRES_PASSWORD: cartzone
      POSTGRES_DB: cartzone
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cartzone -d cartzone"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cartzone-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: cartzone-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgres://cartzone:cartzone@postgres:5432/cartzone
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: dev-access-secret-change-me
      JWT_REFRESH_SECRET: dev-refresh-secret-change-me
      FRONTEND_URL: http://localhost:5173
      STRIPE_SECRET_KEY: ""
      STRIPE_WEBHOOK_SECRET: ""
    ports:
      - "4000:4000"
    command: sh -c "npm run db:migrate && npm run db:seed && npm run dev"
    volumes:
      - ./backend/src:/app/src
      - ./backend/tests:/app/tests

  frontend:
    build:
      context: ./frontend
    container_name: cartzone-web
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend/src:/app/src

volumes:
  postgres_data:
  redis_data:
